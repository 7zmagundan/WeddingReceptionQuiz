<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>結婚式クイズ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ① ホーム画面 -->
  <section id="page-home" class="page active home-page">
    <div class="home-card">

      <!-- 豪華な花の装飾（6つ） -->
      <div class="home-flower f1"></div>
      <div class="home-flower f2"></div>
      <div class="home-flower f3"></div>
      <div class="home-flower f4"></div>
      <div class="home-flower f5"></div>
      <div class="home-flower f6"></div>

      <!-- 光の粒（bokeh） -->
      <div class="bokeh b1"></div>
      <div class="bokeh b2"></div>
      <div class="bokeh b3"></div>

      <h1 class="home-title">Welcome to<br>Wedding Quiz</h1>
      <p class="home-subtitle">新郎新婦にまつわるクイズに挑戦しよう！</p>

      <div class="home-divider"></div>

      <h2>ルール</h2>
      <div class="rules-block">
        <ul>
          <li>全3問の2択クイズ! </li>
          <li>所要時間は1分ほどです。</li>
          <li>全問正解の方には…いいことがあるかもしれません。<br>
          ぜひご参加ください。<br><br>
          ※最後に結果画面が表示されます。<br>
          　結果画面はこのあと行う余興で使用いたします。</li>
        </ul>
      </div>

      <label for="player-name" class="input-label">あなたの名前</label>
      <input type="text" id="player-name" class="name-input" placeholder="例：ゲスト太郎">

      <button class="gold-btn" id="start-btn">クイズを始める</button>
    </div>
  </section>

  <!-- ② クイズ画面 -->
  <section id="page-quiz" class="page quiz-page">
    <div class="quiz-inner">
      <div class="quiz-header">
        <div id="quiz-badge" class="quiz-badge">第 1 / 3 問</div>
      </div>

      <h2 id="quiz-question" class="quiz-question"></h2>

      <div class="choices">
        <button class="choice-btn gold-btn choice-decor" data-choice="A" id="choiceA"></button>
        <button class="choice-btn gold-btn choice-decor" data-choice="B" id="choiceB"></button>
      </div>
    </div>
  </section>

  <!-- ③ 回答確認ページ -->
  <section id="page-check" class="page check-page">
    <div class="check-inner">
      <h1 class="check-title">回答の確認</h1>

      <div id="answer-list"></div>

      <button class="gold-btn" id="restart-btn">最初からやり直す</button>
      <button class="gold-btn" id="to-result-btn">回答を確定して結果画面へ</button>
    </div>
  </section>

  <!-- ④ 結果ページ -->
  <section id="page-result" class="page result-page">

    <!-- ★ ここ全体をキャプチャする -->
    <div id="result-capture-area" class="result-frame">

      <!-- ★ 中身は全部ここに入れる -->
      <div class="result-inner">

        <h1 class="result-title">結果発表</h1>

        <div id="petal-container"></div>
        <div id="gold-container"></div>

        <div class="flower-label-wrapper" id="flower-badge">
          <span class="flower-label-icon">✿</span>
          <span id="flower-label" class="flower-label"></span>
          <span class="flower-label-icon">✿</span>
        </div>

        <div class="tiktok-photo-circle" id="photo-slot"></div>

        <p id="result-message" class="tiktok-message"></p>
        <p id="result-time" class="result-time"></p>

        <p class="screenshot-msg">この画面をスクショまたは保存して<br>おいてもらえると嬉しいです。<br>このあと行う余興で使用いたします。</p>
        <button id="save-image-btn" class="gold-btn">📸 結果を画像保存</button>

      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
